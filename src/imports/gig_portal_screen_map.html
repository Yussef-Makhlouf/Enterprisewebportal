<html lang="en">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="GIG Insurance Portal - Interactive journey maps for Broker, Admin, Travel and Motor insurance flows">
  <title>GIG Insurance Portal - Journey Maps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>

<style>
:root {
  --ind: #19058C;
  --ind-light: #EEF0FB;
  --rg: #C0773A;
  --rg-light: #FBF3EC;
  --sea: #2AADA0;
  --sea-light: #E8F7F5;
  --sun: #E05A45;
  --sun-light: #FDEEEB;
  --oce: #5469D4;
  --oce-light: #EEF0FB;
  --deep: #1F0F4D;

  --bg: #F7F8FA;
  --bg-card: #FFFFFF;
  --bg-hover: #F3F4F8;
  --border: #E3E6EF;
  --border-strong: #CBD0DF;
  --text-primary: #1A1D2E;
  --text-secondary: #6B7280;
  --text-tertiary: #9CA3AF;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
  --shadow-card: 0 2px 8px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
  --shadow-hover: 0 6px 20px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.06);
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

/* ── WRAP ── */
.app-shell {
  max-width: 1440px;
  margin: 0 auto;
  padding: 24px 28px 48px;
}

/* ── TOP BAR ── */
.top-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 24px;
  align-items: center;
}
.top-bar-label {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-right: 6px;
  font-weight: 500;
}
.pill {
  font-size: 11.5px;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: 999px;
  border: 1.5px solid;
  cursor: pointer;
  transition: all .18s ease;
  letter-spacing: .01em;
}
.pill:hover { transform: translateY(-1px); }
.pill.active { color: #fff; }
.pill-all { border-color: var(--border-strong); color: var(--text-secondary); }
.pill-all.active { background: #444; border-color: #444; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
.pill-admin { border-color: var(--ind); color: var(--ind); }
.pill-admin.active { background: var(--ind); box-shadow: 0 2px 8px rgba(25,5,140,.25); }
.pill-broker { border-color: var(--rg); color: var(--rg); }
.pill-broker.active { background: var(--rg); box-shadow: 0 2px 8px rgba(192,119,58,.25); }
.pill-flow { border-color: var(--sea); color: var(--sea); }
.pill-flow.active { background: var(--sea); box-shadow: 0 2px 8px rgba(42,173,160,.25); }
.pill-comp { border-color: var(--oce); color: var(--oce); }
.pill-comp.active { background: var(--oce); box-shadow: 0 2px 8px rgba(84,105,212,.25); }

/* ── STAT ROW ── */
.stat-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px 20px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: box-shadow .2s, transform .2s;
}
.stat-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
.stat-num {
  font-size: 28px;
  font-weight: 700;
  font-family: 'IBM Plex Mono', monospace;
  line-height: 1;
}
.stat-lbl {
  font-size: 11.5px;
  color: var(--text-secondary);
  margin-top: 4px;
  font-weight: 500;
}
.stat-bar {
  height: 3px;
  border-radius: 2px;
  margin-top: 10px;
  opacity: .35;
}

/* ── SECTION ── */
.section { margin-bottom: 32px; }

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.section-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.section-title {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
}
.section-count {
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg);
  padding: 3px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  font-weight: 500;
}

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 10px;
}

/* ── SCREEN CARD ── */
.screen-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 14px 12px 18px;
  cursor: pointer;
  transition: box-shadow .2s, transform .2s, border-color .2s;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 5px;
  box-shadow: var(--shadow-card);
}
.screen-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-hover);
  border-color: var(--border-strong);
}
/* left accent bar */
.screen-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  border-radius: 10px 0 0 10px;
}
.screen-card.admin::before  { background: var(--ind); }
.screen-card.broker::before { background: var(--rg); }
.screen-card.flow::before   { background: var(--sea); }
.screen-card.comp::before   { background: var(--oce); }

/* type tint on hover */
.screen-card.admin:hover  { border-color: rgba(25,5,140,.3); }
.screen-card.broker:hover { border-color: rgba(192,119,58,.3); }
.screen-card.flow:hover   { border-color: rgba(42,173,160,.3); }
.screen-card.comp:hover   { border-color: rgba(84,105,212,.3); }

.card-id {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .6px;
  text-transform: uppercase;
  font-family: 'IBM Plex Mono', monospace;
}
.screen-card.admin  .card-id { color: var(--ind); }
.screen-card.broker .card-id { color: var(--rg); }
.screen-card.flow   .card-id { color: var(--sea); }
.screen-card.comp   .card-id { color: var(--oce); }

.card-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.35;
}
.card-desc {
  font-size: 11.5px;
  color: var(--text-secondary);
  line-height: 1.5;
  flex: 1;
}
.req-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 6px;
}
.req-badge {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 4px;
  border: 1px solid;
  letter-spacing: .02em;
}
.badge-doc  { border-color: rgba(25,5,140,.3);   color: var(--ind); background: var(--ind-light); }
.badge-ds   { border-color: rgba(192,119,58,.35); color: var(--rg);  background: var(--rg-light); }
.badge-rule { border-color: rgba(42,173,160,.35); color: var(--sea); background: var(--sea-light); }
.badge-new  { border-color: rgba(224,90,69,.35);  color: var(--sun); background: var(--sun-light); }

/* ── DETAIL PANEL ── */
.detail-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  margin-top: 28px;
  display: none;
  box-shadow: var(--shadow-hover);
}
.detail-panel.open { display: block; }

.dp-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.dp-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  font-family: 'IBM Plex Mono', monospace;
}
.dp-close {
  cursor: pointer;
  font-size: 20px;
  color: var(--text-tertiary);
  line-height: 1;
  padding: 2px 6px;
  border-radius: 6px;
  transition: background .15s, color .15s;
}
.dp-close:hover { background: var(--bg); color: var(--text-primary); }

.dp-body {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
}
.dp-section { font-size: 12px; }
.dp-label {
  font-weight: 700;
  color: var(--text-tertiary);
  font-size: 10.5px;
  letter-spacing: .8px;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.dp-item {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  margin-bottom: 6px;
  color: var(--text-primary);
  font-size: 12.5px;
  line-height: 1.45;
}
.dp-item::before {
  content: '✓';
  color: var(--sea);
  font-size: 11px;
  flex-shrink: 0;
  margin-top: 2px;
  font-weight: 600;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .stat-row { grid-template-columns: repeat(2,1fr); }
  .dp-body  { grid-template-columns: 1fr; }
}
@media (max-width: 560px) {
  .stat-row { grid-template-columns: 1fr 1fr; }
  .grid { grid-template-columns: 1fr 1fr; }
}

.hidden { display: none; }
</style>

const reqMap   = { 'DOC':'من المستند', 'DS':'من Design System', 'GIG V9':'GIG V9', 'NEW':'مضاف' };
const reqClass = { 'DOC':'badge-doc', 'DS':'badge-ds', 'GIG V9':'badge-ds', 'NEW':'badge-new', 'RULE':'badge-rule' };

let currentFilter = 'all';

function render() {
  const container = document.getElementById('screens-container');
  container.innerHTML = '';
  sections.forEach(sec => {
    const filtered = sec.screens.filter(s => currentFilter === 'all' || s.type === currentFilter);
    if (!filtered.length) return;
    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = `
      <div class="section-header">
        <div class="section-dot" style="background:${sec.dot}"></div>
        <span class="section-title">${sec.label}</span>
        <span class="section-count">${filtered.length} شاشة</span>
      </div>
      <div class="grid" id="grid-${sec.id}"></div>`;
    container.appendChild(div);
    const grid = div.querySelector(`#grid-${sec.id}`);
    filtered.forEach(s => {
      const card = document.createElement('div');
      card.className = `screen-card ${s.type}`;
      card.innerHTML = `
        <div class="card-id">${s.id}</div>
        <div class="card-name">${s.name}</div>
        <div class="card-desc">${s.desc}</div>
        <div class="req-badges">${s.reqs.map(r=>`<span class="req-badge ${reqClass[r]||'badge-doc'}">${reqMap[r]||r}</span>`).join('')}</div>`;
      card.onclick = () => showDetail(s, sec);
      grid.appendChild(card);
    });
  });
}

function showDetail(s, sec) {
  const panel = document.getElementById('detail-panel');
  document.getElementById('dp-title').textContent = `${s.id} · ${s.name}`;
  const d = s.detail;
  document.getElementById('dp-body').innerHTML = `
    <div class="dp-section">
      <div class="dp-label">العناصر والمكونات</div>
      ${d.elements.map(e=>`<div class="dp-item">${e}</div>`).join('')}
    </div>
    <div class="dp-section">
      <div class="dp-label">التفاعلات المبرمجة</div>
      ${d.interactions.map(i=>`<div class="dp-item">${i}</div>`).join('')}
    </div>
    <div class="dp-section">
      <div class="dp-label">تغطية المتطلبات</div>
      ${d.coverage.map(c=>`<div class="dp-item">${c}</div>`).join('')}
    </div>`;
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

function filter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  closeDetail();
  render();
}

render();
</script>
